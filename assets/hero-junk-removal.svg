<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">Junk removal truck</title>
  <desc id="desc">Illustration showing boxed junk being loaded into a removal truck.</desc>
  <style>
    #rear-wheel,
    #front-wheel {
      animation: wheel-spin 1.85s cubic-bezier(.2,.82,.28,1) both;
    }

    #rear-wheel {
      transform-origin: 244px 430px;
    }

    #front-wheel {
      transform-origin: 716px 430px;
    }

    #junk-load {
      animation: box-wobble 1.85s ease-out both;
      transform-origin: 380px 180px;
    }

    @keyframes wheel-spin {
      0% {
        transform: rotate(-900deg);
      }

      76% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    @keyframes box-wobble {
      0%, 24%, 48% {
        transform: rotate(-2deg) translateY(2px);
      }

      12%, 36%, 60% {
        transform: rotate(2deg) translateY(-2px);
      }

      78% {
        transform: rotate(-1deg);
      }

      100% {
        transform: rotate(0deg) translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #rear-wheel,
      #front-wheel,
      #junk-load {
        animation: none;
      }
    }
  </style>
  <rect width="900" height="640" fill="#eef2e8"/>
  <rect x="70" y="408" width="760" height="70" rx="12" fill="#d5ddcf"/>
  <g id="junk-load">
    <rect x="176" y="120" width="118" height="94" rx="10" fill="#ffffff" stroke="#c7d1c0" stroke-width="5"/>
    <path d="M176 154h118" stroke="#d9e2d4" stroke-width="5"/>
    <path d="M235 120v94" stroke="#d9e2d4" stroke-width="5"/>
    <rect x="314" y="146" width="104" height="68" rx="10" fill="#f4b942"/>
    <path d="M314 178h104" stroke="#d89d28" stroke-width="5"/>
    <rect x="450" y="118" width="130" height="96" rx="10" fill="#ffffff" stroke="#c7d1c0" stroke-width="5"/>
    <path d="M450 166h130" stroke="#d9e2d4" stroke-width="5"/>
    <path d="M515 118v96" stroke="#d9e2d4" stroke-width="5"/>
  </g>
  <rect x="118" y="226" width="520" height="184" rx="16" fill="#ffffff"/>
  <rect x="638" y="278" width="124" height="132" rx="14" fill="#17834f"/>
  <path d="M762 328h44l36 82h-80z" fill="#0f5f3b"/>
  <rect x="168" y="270" width="184" height="88" rx="8" fill="#f4b942"/>
  <rect x="382" y="260" width="142" height="98" rx="8" fill="#dfe5da"/>
  <rect x="542" y="314" width="82" height="44" rx="8" fill="#dfe5da"/>
  <g id="rear-wheel">
    <circle cx="244" cy="430" r="48" fill="#15221c"/>
    <circle cx="244" cy="430" r="20" fill="#eef2e8"/>
    <path d="M244 382v96M196 430h96M210 396l68 68M278 396l-68 68" stroke="#90a097" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g id="front-wheel">
    <circle cx="716" cy="430" r="48" fill="#15221c"/>
    <circle cx="716" cy="430" r="20" fill="#eef2e8"/>
    <path d="M716 382v96M668 430h96M682 396l68 68M750 396l-68 68" stroke="#90a097" stroke-width="8" stroke-linecap="round"/>
  </g>
  <path d="M135 504h635" stroke="#a8b6a2" stroke-width="10" stroke-linecap="round"/>
  <text x="150" y="336" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#15221c">JUNK REMOVAL</text>
</svg>
